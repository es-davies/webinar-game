<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GridLands</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Press Start 2P', monospace;
    background: #000;
    color: #ccc;
    height: 100vh;
    overflow: hidden;
    display: flex;
    image-rendering: pixelated;
  }

  /* ── Sidebar ── */
  #sidebar {
    width: 270px;
    min-width: 270px;
    background: #05050a;
    padding: 16px 12px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    border-right: 2px solid #00ffff;
    z-index: 10;
    overflow-y: auto;
  }
  #sidebar::-webkit-scrollbar { width: 4px; }
  #sidebar::-webkit-scrollbar-thumb { background: #00ffff; }
  #sidebar::-webkit-scrollbar-track { background: #111; }

  #sidebar h1 {
    font-size: 18px;
    color: #ffff00;
    text-align: center;
    text-shadow:
      0 0 8px #ffff00,
      0 0 20px rgba(255,200,0,.4),
      -1px 0 #ff0044,
       1px 0 #00ffff;
    padding: 8px 0;
    letter-spacing: 3px;
  }

  .stats-row {
    display: flex;
    justify-content: space-around;
    text-align: center;
    border: 1px solid #333;
    padding: 10px 4px;
    background: #0a0a10;
  }
  .stat {
    font-size: 7px;
    color: #00ffff;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .stat strong {
    display: block;
    color: #fff;
    font-size: 18px;
    margin-top: 4px;
    text-shadow: 0 0 6px currentColor;
  }
  .stat .score-val { color: #ffff00; }

  .btn-row { display: flex; gap: 6px; }
  .btn-row button {
    flex: 1;
    padding: 10px 0;
    font-family: 'Press Start 2P', monospace;
    font-size: 8px;
    font-weight: 400;
    border: 2px solid;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: box-shadow .15s, background .15s;
  }
  #new-game-btn {
    background: #111;
    color: #ffff00;
    border-color: #ffff00;
  }
  #new-game-btn:hover {
    background: #ffff00;
    color: #000;
    box-shadow: 0 0 12px #ffff00;
  }
  #undo-btn {
    background: #111;
    color: #00ffff;
    border-color: #00ffff;
  }
  #undo-btn:hover {
    background: #00ffff;
    color: #000;
    box-shadow: 0 0 12px #00ffff;
  }
  #undo-btn:disabled {
    opacity: .25;
    cursor: default;
    box-shadow: none;
    background: #111;
    color: #00ffff;
  }

  /* Section headers */
  #quests-section h3,
  #legend h3 {
    font-size: 7px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #ff00ff;
    text-shadow: 0 0 6px rgba(255,0,255,.4);
    padding-bottom: 4px;
    border-bottom: 1px solid #333;
    margin-bottom: 6px;
  }

  /* Quests */
  #quests-section { display: flex; flex-direction: column; gap: 6px; }

  .quest-card {
    background: #0a0a14;
    border: 1px solid #333;
    padding: 8px;
    transition: border-color .3s, box-shadow .3s;
  }
  .quest-card .q-name {
    font-size: 8px;
    color: #ffff00;
    margin-bottom: 3px;
    text-shadow: 0 0 4px rgba(255,255,0,.3);
  }
  .quest-card .q-desc {
    font-size: 6px;
    color: #666;
    margin-bottom: 6px;
    line-height: 1.6;
  }
  .quest-card .q-progress-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 4px;
  }
  .quest-card .q-progress-text {
    font-size: 7px;
    color: #00ffff;
    min-width: 44px;
  }
  .q-bar {
    flex: 1;
    height: 6px;
    background: #1a1a2a;
    overflow: hidden;
  }
  .q-bar-fill {
    height: 100%;
    background: #ff00ff;
    box-shadow: 0 0 6px rgba(255,0,255,.5);
    transition: width .4s ease;
  }
  .quest-card .q-reward {
    font-size: 6px;
    color: #555;
  }

  @keyframes arcadeFlash {
    0%   { border-color: #ffff00; box-shadow: 0 0 16px rgba(255,255,0,.6), inset 0 0 16px rgba(255,255,0,.1); }
    50%  { border-color: #ff00ff; box-shadow: 0 0 16px rgba(255,0,255,.6), inset 0 0 16px rgba(255,0,255,.1); }
    100% { border-color: #333; box-shadow: none; }
  }
  .quest-card.flash { animation: arcadeFlash 1s ease-out; }

  /* Legend */
  #legend { display: flex; flex-direction: column; gap: 5px; }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 7px;
    color: #999;
  }
  .legend-swatch {
    width: 22px;
    height: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-family: 'Press Start 2P', monospace;
    border: 1px solid;
  }

  /* ── Canvas area ── */
  #game-area {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: #000;
  }

  /* CRT scanlines */
  #game-area::after {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.12) 2px,
      rgba(0,0,0,0.12) 4px
    );
    pointer-events: none;
    z-index: 6;
  }
  /* CRT vignette */
  #game-area::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.65) 100%);
    pointer-events: none;
    z-index: 6;
  }

  canvas {
    display: block;
    width: 100%;
    height: 100%;
  }

  /* ── Next Tile Preview ── */
  #preview {
    position: absolute;
    bottom: 20px;
    right: 20px;
    background: #05050a;
    border: 2px solid #00ffff;
    padding: 12px 16px;
    text-align: center;
    z-index: 10;
  }
  #preview .label {
    font-size: 6px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #00ffff;
    margin-bottom: 6px;
  }
  #preview .tile-name {
    font-size: 10px;
  }
  #preview canvas {
    width: 70px;
    height: 70px;
    margin: 6px auto 0;
  }

  /* ── Nav controls hint ── */
  #nav-controls {
    position: absolute;
    bottom: 20px;
    left: 20px;
    background: #05050aee;
    border: 1px solid #333;
    padding: 10px 12px;
    z-index: 10;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  #nav-controls .label {
    font-size: 6px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #ff00ff;
    margin-bottom: 2px;
  }
  .nav-row {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 6px;
    color: #666;
  }
  kbd {
    display: inline-block;
    background: #111;
    color: #00ffff;
    border: 1px solid #00ffff;
    padding: 2px 5px;
    font-family: 'Press Start 2P', monospace;
    font-size: 6px;
    min-width: 18px;
    text-align: center;
    line-height: 1.4;
  }

  /* ── End overlay ── */
  #overlay {
    display: none;
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, .88);
    z-index: 50;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 24px;
  }
  #overlay.visible { display: flex; }
  #overlay h2 {
    font-size: 28px;
    color: #ff0044;
    text-shadow:
      0 0 12px #ff0044,
      0 0 30px rgba(255,0,68,.4),
      -2px 0 #ffff00,
       2px 0 #00ffff;
    letter-spacing: 4px;
  }
  #overlay .final-score {
    font-size: 10px;
    color: #aaa;
  }
  #overlay .final-score strong {
    color: #ffff00;
    font-size: 20px;
    text-shadow: 0 0 8px rgba(255,255,0,.5);
  }
  #overlay button {
    font-family: 'Press Start 2P', monospace;
    background: #000;
    color: #00ff41;
    border: 2px solid #00ff41;
    padding: 14px 28px;
    font-size: 10px;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 1px;
    animation: btnPulse 1.5s ease-in-out infinite;
  }
  #overlay button:hover {
    background: #00ff41;
    color: #000;
    box-shadow: 0 0 20px #00ff41;
  }
  @keyframes btnPulse {
    0%, 100% { box-shadow: 0 0 4px rgba(0,255,65,.3); }
    50%      { box-shadow: 0 0 16px rgba(0,255,65,.6); }
  }

  /* ── Credit line ── */
  #credit {
    position: absolute;
    bottom: 6px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 5px;
    color: #333;
    letter-spacing: 1px;
    z-index: 7;
    pointer-events: none;
  }
</style>
</head>
<body>

<!-- Sidebar -->
<div id="sidebar">
  <h1>GRIDLANDS</h1>

  <div class="stats-row">
    <div class="stat">SCORE<br><strong class="score-val" id="score-value">0</strong></div>
    <div class="stat">TILES<br><strong id="tiles-remaining">40</strong></div>
  </div>

  <div class="btn-row">
    <button id="new-game-btn">NEW GAME</button>
    <button id="undo-btn" disabled>UNDO</button>
  </div>

  <div id="quests-section">
    <h3>CURRENT QUESTS</h3>
    <div id="quest-list"></div>
  </div>

  <div id="legend">
    <h3>TILE LEGEND</h3>
  </div>
</div>

<!-- Main canvas -->
<div id="game-area">
  <canvas id="board"></canvas>

  <!-- Next tile preview -->
  <div id="preview">
    <div class="label">NEXT TILE</div>
    <div class="tile-name" id="preview-name"></div>
    <canvas id="preview-canvas" width="70" height="70"></canvas>
  </div>

  <!-- Navigation controls hint -->
  <div id="nav-controls">
    <div class="label">CONTROLS</div>
    <div class="nav-row"><kbd>&larr;</kbd><kbd>&uarr;</kbd><kbd>&darr;</kbd><kbd>&rarr;</kbd> PAN</div>
    <div class="nav-row"><kbd>+</kbd> <kbd>&minus;</kbd> ZOOM</div>
    <div class="nav-row">DRAG &middot; SCROLL</div>
  </div>

  <!-- End-of-game overlay -->
  <div id="overlay">
    <h2>GAME OVER</h2>
    <p class="final-score">SCORE <strong id="final-score-val">0</strong></p>
    <button id="overlay-new-game">CONTINUE?</button>
  </div>

  <div id="credit">INSERT COIN &bull; 2026 GRIDLANDS</div>
</div>

<script>
// ════════════════════════════════════════════
//  TILE DEFINITIONS  (arcade neon palette)
// ════════════════════════════════════════════
const TILE_TYPES = [
  { name: 'FOREST',  color: '#00ff41', dark: '#002a0e', icon: 'F' },
  { name: 'VILLAGE', color: '#ff8800', dark: '#2a1500', icon: 'V' },
  { name: 'FIELD',   color: '#bbff00', dark: '#202a00', icon: 'W' },
  { name: 'RIVER',   color: '#00ccff', dark: '#001e2a', icon: '~' },
  { name: 'RAIL',    color: '#cc77ff', dark: '#1a0033', icon: '#' },
];

const STARTING_TILES = 40;
const TILES_PER_TYPE_IN_BAG = 8;

// ════════════════════════════════════════════
//  HEX MATH  (flat-top hexagons)
// ════════════════════════════════════════════
const HEX_SIZE = 42;

const DIRS = [
  [+1, 0], [-1, 0], [0, +1], [0, -1], [+1, -1], [-1, +1]
];

function hexToPixel(q, r) {
  const x = HEX_SIZE * (3 / 2 * q);
  const y = HEX_SIZE * (Math.sqrt(3) / 2 * q + Math.sqrt(3) * r);
  return { x, y };
}

function pixelToHex(px, py) {
  const q = (2 / 3 * px) / HEX_SIZE;
  const r = (-1 / 3 * px + Math.sqrt(3) / 3 * py) / HEX_SIZE;
  return hexRound(q, r);
}

function hexRound(qf, rf) {
  const sf = -qf - rf;
  let q = Math.round(qf);
  let r = Math.round(rf);
  let s = Math.round(sf);
  const dq = Math.abs(q - qf);
  const dr = Math.abs(r - rf);
  const ds = Math.abs(s - sf);
  if (dq > dr && dq > ds) q = -r - s;
  else if (dr > ds) r = -q - s;
  return { q, r };
}

function hexKey(q, r) { return `${q},${r}`; }
function parseKey(k) { const p = k.split(','); return { q: +p[0], r: +p[1] }; }

function getNeighbors(q, r) {
  return DIRS.map(([dq, dr]) => ({ q: q + dq, r: r + dr }));
}

// ════════════════════════════════════════════
//  BAG SHUFFLE SYSTEM
// ════════════════════════════════════════════
let bag = [];

function fillBag() {
  bag = [];
  for (let i = 0; i < TILE_TYPES.length; i++) {
    for (let j = 0; j < TILES_PER_TYPE_IN_BAG; j++) {
      bag.push(i);
    }
  }
  shuffleArray(bag);
}

function shuffleArray(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

function drawFromBag() {
  if (bag.length === 0) fillBag();
  return bag.pop();
}

// ════════════════════════════════════════════
//  QUEST HELPERS
// ════════════════════════════════════════════
function findLargestCluster(tileIdx) {
  const visited = new Set();
  let best = { size: 0, tiles: [] };
  for (const [key, type] of placed) {
    if (type !== tileIdx || visited.has(key)) continue;
    const component = [];
    const queue = [key];
    visited.add(key);
    while (queue.length) {
      const k = queue.shift();
      component.push(k);
      const { q, r } = parseKey(k);
      for (const n of getNeighbors(q, r)) {
        const nk = hexKey(n.q, n.r);
        if (!visited.has(nk) && placed.get(nk) === tileIdx) {
          visited.add(nk);
          queue.push(nk);
        }
      }
    }
    if (component.length > best.size) {
      best = { size: component.length, tiles: component };
    }
  }
  return best;
}

function findLongestLine(tileIdx) {
  const axes = [[1, 0], [0, 1], [1, -1]];
  let best = { length: 0, tiles: [] };
  const checked = new Set();

  for (const [key, type] of placed) {
    if (type !== tileIdx) continue;
    const { q, r } = parseKey(key);
    for (const [dq, dr] of axes) {
      const lineKey = `${key}|${dq},${dr}`;
      if (checked.has(lineKey)) continue;

      const tiles = [key];
      let cq = q + dq, cr = r + dr;
      while (placed.get(hexKey(cq, cr)) === tileIdx) {
        const k = hexKey(cq, cr);
        tiles.push(k);
        checked.add(`${k}|${dq},${dr}`);
        cq += dq; cr += dr;
      }
      cq = q - dq; cr = r - dr;
      while (placed.get(hexKey(cq, cr)) === tileIdx) {
        const k = hexKey(cq, cr);
        tiles.unshift(k);
        checked.add(`${k}|${dq},${dr}`);
        cq -= dq; cr -= dr;
      }
      if (tiles.length > best.length) {
        best = { length: tiles.length, tiles };
      }
    }
  }
  return best;
}

function randInt(min, max) {
  return min + Math.floor(Math.random() * (max - min + 1));
}

function generateQuest(excludeTileIdxs) {
  const mechanics = [
    { type: 'cluster', labels: ['connected', 'grouped together'], targetMin: 5, targetMax: 8 },
    { type: 'line', labels: ['in a line'], targetMin: 4, targetMax: 6 },
  ];
  const mech = mechanics[Math.floor(Math.random() * mechanics.length)];
  let tileIdx;
  let tries = 0;
  do {
    tileIdx = Math.floor(Math.random() * TILE_TYPES.length);
    tries++;
  } while (excludeTileIdxs.includes(tileIdx) && tries < 20);

  const target = randInt(mech.targetMin, mech.targetMax);
  const label = mech.labels[Math.floor(Math.random() * mech.labels.length)];
  const rewardTiles = randInt(3, 6);
  const rewardPts = target * 25;

  return {
    name: `BIG ${TILE_TYPES[tileIdx].name}`,
    desc: `Place ${target} ${TILE_TYPES[tileIdx].name}s ${label}`,
    mechanic: mech.type,
    tileIdx,
    target,
    progress: 0,
    rewardTiles,
    rewardPts,
  };
}

// ════════════════════════════════════════════
//  GAME STATE
// ════════════════════════════════════════════
let placed = new Map();
let ghosts = new Set();
let flags = new Set();
let tilesLeft = STARTING_TILES;
let nextTile = 0;
let gameOver = false;
let score = 0;
let displayScore = 0;
let quests = [];
let undoStack = [];

let camX = 0, camY = 0;
let zoom = 1;
const ZOOM_MIN = 0.3, ZOOM_MAX = 3, ZOOM_STEP = 0.1;
let dragging = false, dragStartX, dragStartY, camStartX, camStartY;

let floatingTexts = [];
let animFrameId = null;

const boardCanvas = document.getElementById('board');
const ctx = boardCanvas.getContext('2d');
const previewCanvas = document.getElementById('preview-canvas');
const pctx = previewCanvas.getContext('2d');

// ════════════════════════════════════════════
//  INIT / NEW GAME
// ════════════════════════════════════════════
function newGame() {
  placed = new Map();
  ghosts = new Set();
  flags = new Set();
  tilesLeft = STARTING_TILES;
  score = 0;
  displayScore = 0;
  gameOver = false;
  undoStack = [];
  floatingTexts = [];

  fillBag();

  const startType = drawFromBag();
  placed.set(hexKey(0, 0), startType);
  rebuildGhosts();

  quests = [
    { name: 'BIG FOREST',  desc: 'Place 7 connected FORESTs',        mechanic: 'cluster', tileIdx: 0, target: 7, progress: 0, rewardTiles: 5, rewardPts: 180 },
    { name: 'BIG RIVER',   desc: 'Place 8 RIVERs in a line',         mechanic: 'line',    tileIdx: 3, target: 8, progress: 0, rewardTiles: 5, rewardPts: 180 },
    { name: 'BIG FIELD',   desc: 'Place 8 FIELDs grouped together',  mechanic: 'cluster', tileIdx: 2, target: 8, progress: 0, rewardTiles: 5, rewardPts: 180 },
  ];

  nextTile = drawFromBag();
  updateUI();
  renderQuests();
  document.getElementById('overlay').classList.remove('visible');
  draw();
}

function rebuildGhosts() {
  ghosts.clear();
  for (const key of placed.keys()) {
    const { q, r } = parseKey(key);
    for (const n of getNeighbors(q, r)) {
      const nk = hexKey(n.q, n.r);
      if (!placed.has(nk)) ghosts.add(nk);
    }
  }
}

// ════════════════════════════════════════════
//  UNDO
// ════════════════════════════════════════════
function saveSnapshot() {
  return {
    placed: new Map(placed),
    bag: [...bag],
    nextTile,
    tilesLeft,
    score,
    quests: JSON.parse(JSON.stringify(quests)),
    flags: new Set(flags),
  };
}

function undo() {
  if (undoStack.length === 0) return;
  const snap = undoStack.pop();
  placed = snap.placed;
  bag = snap.bag;
  nextTile = snap.nextTile;
  tilesLeft = snap.tilesLeft;
  score = snap.score;
  displayScore = snap.score;
  quests = snap.quests;
  flags = snap.flags;
  gameOver = false;
  floatingTexts = [];
  rebuildGhosts();
  updateUI();
  renderQuests();
  document.getElementById('overlay').classList.remove('visible');
  draw();
}

// ════════════════════════════════════════════
//  SCORING
// ════════════════════════════════════════════
function calcPlacementScore(q, r, typeIdx) {
  let pts = 10;
  for (const n of getNeighbors(q, r)) {
    if (placed.get(hexKey(n.q, n.r)) === typeIdx) {
      pts += 15;
    }
  }
  return pts;
}

// ════════════════════════════════════════════
//  QUEST CHECKING
// ════════════════════════════════════════════
function updateQuests(placedQ, placedR) {
  for (let i = 0; i < quests.length; i++) {
    const quest = quests[i];
    let result;
    if (quest.mechanic === 'cluster') {
      result = findLargestCluster(quest.tileIdx);
      quest.progress = result.size;
    } else {
      result = findLongestLine(quest.tileIdx);
      quest.progress = result.length;
    }

    if (quest.progress >= quest.target) {
      score += quest.rewardPts;
      tilesLeft += quest.rewardTiles;
      flags.add(hexKey(placedQ, placedR));

      addFloatingText(placedQ, placedR,
        `+${quest.rewardPts}PTS +${quest.rewardTiles}TILES`, '#ff00ff');

      const excludeIdxs = quests.filter((_, j) => j !== i).map(q2 => q2.tileIdx);
      quests[i] = generateQuest(excludeIdxs);

      const nq = quests[i];
      if (nq.mechanic === 'cluster') {
        nq.progress = findLargestCluster(nq.tileIdx).size;
      } else {
        nq.progress = findLongestLine(nq.tileIdx).length;
      }

      requestAnimationFrame(() => {
        const cards = document.querySelectorAll('.quest-card');
        if (cards[i]) {
          cards[i].classList.add('flash');
          setTimeout(() => cards[i].classList.remove('flash'), 1000);
        }
      });
    }
  }
  renderQuests();
}

// ════════════════════════════════════════════
//  FLOATING TEXT / ANIMATION
// ════════════════════════════════════════════
function addFloatingText(q, r, text, color) {
  const { x, y } = hexToPixel(q, r);
  floatingTexts.push({ x, y, text, color: color || '#ffff00', age: 0 });
  startAnimation();
}

function startAnimation() {
  if (animFrameId) return;
  lastAnimTime = performance.now();
  animFrameId = requestAnimationFrame(animLoop);
}

let lastAnimTime = 0;
function animLoop(now) {
  const dt = now - lastAnimTime;
  lastAnimTime = now;
  let needsUpdate = false;

  for (const ft of floatingTexts) ft.age += dt;
  floatingTexts = floatingTexts.filter(ft => ft.age < 1500);
  if (floatingTexts.length > 0) needsUpdate = true;

  if (displayScore !== score) {
    const diff = score - displayScore;
    displayScore += Math.sign(diff) * Math.max(1, Math.ceil(Math.abs(diff) * dt / 300));
    if (Math.abs(displayScore - score) < 2) displayScore = score;
    document.getElementById('score-value').textContent = displayScore;
    needsUpdate = true;
  }

  draw();

  if (needsUpdate) {
    animFrameId = requestAnimationFrame(animLoop);
  } else {
    animFrameId = null;
  }
}

// ════════════════════════════════════════════
//  DRAWING
// ════════════════════════════════════════════
function resize() {
  const rect = boardCanvas.parentElement.getBoundingClientRect();
  boardCanvas.width = rect.width * devicePixelRatio;
  boardCanvas.height = rect.height * devicePixelRatio;
  ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
  draw();
}

function draw() {
  const w = boardCanvas.width / devicePixelRatio;
  const h = boardCanvas.height / devicePixelRatio;
  ctx.clearRect(0, 0, w, h);

  ctx.save();
  ctx.translate(w / 2 + camX, h / 2 + camY);
  ctx.scale(zoom, zoom);

  // Draw ghosts
  for (const key of ghosts) {
    const { q, r } = parseKey(key);
    const { x, y } = hexToPixel(q, r);
    drawHex(ctx, x, y, HEX_SIZE, null, true);
  }

  // Draw placed tiles
  for (const [key, typeIdx] of placed) {
    const { q, r } = parseKey(key);
    const { x, y } = hexToPixel(q, r);
    drawHex(ctx, x, y, HEX_SIZE, typeIdx, false);
  }

  // Draw flags
  for (const key of flags) {
    const { q, r } = parseKey(key);
    const { x, y } = hexToPixel(q, r);
    ctx.font = `${HEX_SIZE * 0.25}px 'Press Start 2P', monospace`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#ff0044';
    ctx.shadowColor = '#ff0044';
    ctx.shadowBlur = 6;
    ctx.fillText('!', x + HEX_SIZE * 0.28, y - HEX_SIZE * 0.22);
    ctx.shadowBlur = 0;
  }

  // Draw floating texts
  for (const ft of floatingTexts) {
    const alpha = Math.max(0, 1 - ft.age / 1500);
    const yOff = -HEX_SIZE * 0.8 - (ft.age / 1500) * 40;
    ctx.globalAlpha = alpha;
    ctx.font = `${10 / zoom}px 'Press Start 2P', monospace`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 3 / zoom;
    ctx.strokeText(ft.text, ft.x, ft.y + yOff);
    ctx.fillStyle = ft.color;
    ctx.fillText(ft.text, ft.x, ft.y + yOff);
  }
  ctx.globalAlpha = 1;

  ctx.restore();
}

function drawHex(context, cx, cy, size, typeIdx, isGhost) {
  context.beginPath();
  for (let i = 0; i < 6; i++) {
    const angle = Math.PI / 180 * (60 * i);
    const vx = cx + size * Math.cos(angle);
    const vy = cy + size * Math.sin(angle);
    if (i === 0) context.moveTo(vx, vy);
    else context.lineTo(vx, vy);
  }
  context.closePath();

  if (isGhost) {
    context.strokeStyle = 'rgba(0, 255, 255, 0.15)';
    context.lineWidth = 1;
    context.setLineDash([3, 5]);
    context.stroke();
    context.setLineDash([]);
  } else {
    const tile = TILE_TYPES[typeIdx];

    // Dark fill
    context.fillStyle = tile.dark;
    context.fill();

    // Neon border with glow
    context.shadowColor = tile.color;
    context.shadowBlur = 10;
    context.strokeStyle = tile.color;
    context.lineWidth = 2;
    context.stroke();
    context.shadowBlur = 0;

    // Inner border accent
    context.strokeStyle = tile.color + '44';
    context.lineWidth = 0.5;
    context.beginPath();
    for (let i = 0; i < 6; i++) {
      const angle = Math.PI / 180 * (60 * i);
      const vx = cx + (size - 5) * Math.cos(angle);
      const vy = cy + (size - 5) * Math.sin(angle);
      if (i === 0) context.moveTo(vx, vy);
      else context.lineTo(vx, vy);
    }
    context.closePath();
    context.stroke();

    // Pixel-font icon letter
    context.font = `${size * 0.4}px 'Press Start 2P', monospace`;
    context.textAlign = 'center';
    context.textBaseline = 'middle';
    context.shadowColor = tile.color;
    context.shadowBlur = 8;
    context.fillStyle = tile.color;
    context.fillText(tile.icon, cx, cy + 2);
    context.shadowBlur = 0;
  }
}

function drawPreview() {
  const s = 70;
  pctx.clearRect(0, 0, s, s);
  pctx.save();
  pctx.translate(s / 2, s / 2);
  drawHex(pctx, 0, 0, 28, nextTile, false);
  pctx.restore();
}

// ════════════════════════════════════════════
//  UI UPDATES
// ════════════════════════════════════════════
function updateUI() {
  document.getElementById('score-value').textContent = displayScore;
  document.getElementById('tiles-remaining').textContent = tilesLeft;
  document.getElementById('undo-btn').disabled = undoStack.length === 0;
  const tile = TILE_TYPES[nextTile];
  document.getElementById('preview-name').textContent = tile.name;
  document.getElementById('preview-name').style.color = tile.color;
  document.getElementById('preview-name').style.textShadow = `0 0 6px ${tile.color}`;
  drawPreview();
}

function renderQuests() {
  const container = document.getElementById('quest-list');
  container.innerHTML = '';
  for (const quest of quests) {
    const pct = Math.min(100, Math.round((quest.progress / quest.target) * 100));
    const card = document.createElement('div');
    card.className = 'quest-card';
    card.innerHTML = `
      <div class="q-name">${quest.name}</div>
      <div class="q-desc">${quest.desc}</div>
      <div class="q-progress-row">
        <span class="q-progress-text">${quest.progress}/${quest.target}</span>
        <div class="q-bar"><div class="q-bar-fill" style="width:${pct}%"></div></div>
      </div>
      <div class="q-reward">+${quest.rewardTiles} TILES +${quest.rewardPts} PTS</div>
    `;
    container.appendChild(card);
  }
}

function buildLegend() {
  const container = document.getElementById('legend');
  TILE_TYPES.forEach(t => {
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.innerHTML = `<div class="legend-swatch" style="background:${t.dark};color:${t.color};border-color:${t.color}">${t.icon}</div><span style="color:${t.color}">${t.name}</span>`;
    container.appendChild(item);
  });
}

// ════════════════════════════════════════════
//  INPUT HANDLING
// ════════════════════════════════════════════
boardCanvas.addEventListener('pointerdown', e => {
  dragging = true;
  dragStartX = e.clientX;
  dragStartY = e.clientY;
  camStartX = camX;
  camStartY = camY;
  boardCanvas.setPointerCapture(e.pointerId);
});

boardCanvas.addEventListener('pointermove', e => {
  if (!dragging) return;
  camX = camStartX + (e.clientX - dragStartX);
  camY = camStartY + (e.clientY - dragStartY);
  draw();
});

boardCanvas.addEventListener('pointerup', e => {
  if (!dragging) return;
  const dx = e.clientX - dragStartX;
  const dy = e.clientY - dragStartY;
  dragging = false;
  if (Math.abs(dx) < 5 && Math.abs(dy) < 5) {
    handleClick(e);
  }
});

function handleClick(e) {
  if (gameOver) return;

  const rect = boardCanvas.getBoundingClientRect();
  const w = boardCanvas.width / devicePixelRatio;
  const h = boardCanvas.height / devicePixelRatio;

  const mx = (e.clientX - rect.left - w / 2 - camX) / zoom;
  const my = (e.clientY - rect.top - h / 2 - camY) / zoom;

  const { q, r } = pixelToHex(mx, my);
  const key = hexKey(q, r);

  if (ghosts.has(key)) {
    undoStack.push(saveSnapshot());

    placed.set(key, nextTile);
    tilesLeft--;

    const pts = calcPlacementScore(q, r, nextTile);
    score += pts;
    addFloatingText(q, r, `+${pts}`, '#ffff00');

    rebuildGhosts();
    updateQuests(q, r);

    if (tilesLeft <= 0) {
      gameOver = true;
      document.getElementById('final-score-val').textContent = score;
      document.getElementById('overlay').classList.add('visible');
    } else {
      nextTile = drawFromBag();
    }

    updateUI();
    draw();
    startAnimation();
  }
}

// ════════════════════════════════════════════
//  ZOOM (mouse wheel)
// ════════════════════════════════════════════
boardCanvas.addEventListener('wheel', e => {
  e.preventDefault();
  const delta = e.deltaY > 0 ? -ZOOM_STEP : ZOOM_STEP;
  zoom = Math.min(ZOOM_MAX, Math.max(ZOOM_MIN, zoom + delta));
  draw();
}, { passive: false });

// ════════════════════════════════════════════
//  KEYBOARD CONTROLS
// ════════════════════════════════════════════
const PAN_SPEED = 40;

window.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'z') {
    e.preventDefault();
    undo();
    return;
  }

  let handled = true;
  switch (e.key) {
    case 'ArrowLeft':  camX += PAN_SPEED; break;
    case 'ArrowRight': camX -= PAN_SPEED; break;
    case 'ArrowUp':    camY += PAN_SPEED; break;
    case 'ArrowDown':  camY -= PAN_SPEED; break;
    case '+': case '=':
      zoom = Math.min(ZOOM_MAX, zoom + ZOOM_STEP);
      break;
    case '-': case '_':
      zoom = Math.max(ZOOM_MIN, zoom - ZOOM_STEP);
      break;
    default: handled = false;
  }
  if (handled) {
    e.preventDefault();
    draw();
  }
});

// ════════════════════════════════════════════
//  BUTTONS
// ════════════════════════════════════════════
document.getElementById('new-game-btn').addEventListener('click', () => {
  camX = 0; camY = 0; zoom = 1;
  newGame();
});
document.getElementById('overlay-new-game').addEventListener('click', () => {
  camX = 0; camY = 0; zoom = 1;
  newGame();
});
document.getElementById('undo-btn').addEventListener('click', undo);

// ════════════════════════════════════════════
//  BOOT  (wait for pixel font)
// ════════════════════════════════════════════
window.addEventListener('resize', resize);
buildLegend();
document.fonts.ready.then(() => {
  resize();
  newGame();
});
</script>
