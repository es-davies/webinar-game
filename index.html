<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GridLands</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #1a1a2e;
    color: #e0e0e0;
    height: 100vh;
    overflow: hidden;
    display: flex;
  }

  /* ── Sidebar ── */
  #sidebar {
    width: 220px;
    min-width: 220px;
    background: #16213e;
    padding: 24px 18px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    border-right: 2px solid #0f3460;
    z-index: 10;
  }

  #sidebar h1 {
    font-size: 28px;
    letter-spacing: 2px;
    color: #e0a535;
    text-align: center;
    text-transform: uppercase;
  }

  #sidebar .info {
    font-size: 15px;
    text-align: center;
    color: #9db5d4;
  }

  #sidebar .info strong {
    color: #fff;
    font-size: 22px;
  }

  #new-game-btn {
    background: #e0a535;
    color: #1a1a2e;
    border: none;
    padding: 10px 0;
    font-size: 15px;
    font-weight: 700;
    border-radius: 6px;
    cursor: pointer;
    transition: background .2s;
  }
  #new-game-btn:hover { background: #f0b848; }

  /* Legend */
  #legend { display: flex; flex-direction: column; gap: 8px; }
  #legend h3 {
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #6c8ebf;
    margin-bottom: 2px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 14px;
  }
  .legend-swatch {
    width: 28px;
    height: 28px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
  }

  /* ── Canvas area ── */
  #game-area {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  canvas {
    display: block;
    width: 100%;
    height: 100%;
  }

  /* ── Next Tile Preview ── */
  #preview {
    position: absolute;
    bottom: 24px;
    right: 24px;
    background: #16213e;
    border: 2px solid #0f3460;
    border-radius: 12px;
    padding: 14px 20px;
    text-align: center;
    z-index: 10;
  }
  #preview .label {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #6c8ebf;
    margin-bottom: 8px;
  }
  #preview .tile-name {
    font-size: 18px;
    font-weight: 700;
  }
  #preview canvas {
    width: 70px;
    height: 70px;
    margin: 6px auto 0;
  }

  /* ── Nav controls hint ── */
  #nav-controls {
    position: absolute;
    bottom: 24px;
    left: 24px;
    background: #16213e;
    border: 2px solid #0f3460;
    border-radius: 12px;
    padding: 12px 16px;
    z-index: 10;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  #nav-controls .label {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #6c8ebf;
    margin-bottom: 2px;
  }
  .nav-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: #9db5d4;
  }
  kbd {
    display: inline-block;
    background: #0f3460;
    color: #e0e0e0;
    border: 1px solid #1a4a7a;
    border-radius: 4px;
    padding: 2px 7px;
    font-family: 'Segoe UI', monospace;
    font-size: 12px;
    min-width: 24px;
    text-align: center;
    line-height: 1.4;
  }

  /* ── End overlay ── */
  #overlay {
    display: none;
    position: absolute;
    inset: 0;
    background: rgba(10, 10, 30, .82);
    z-index: 50;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 18px;
  }
  #overlay.visible { display: flex; }
  #overlay h2 {
    font-size: 42px;
    color: #e0a535;
  }
  #overlay button {
    background: #e0a535;
    color: #1a1a2e;
    border: none;
    padding: 12px 32px;
    font-size: 16px;
    font-weight: 700;
    border-radius: 6px;
    cursor: pointer;
  }
  #overlay button:hover { background: #f0b848; }
</style>
</head>
<body>

<!-- Sidebar -->
<div id="sidebar">
  <h1>GridLands</h1>
  <div class="info">Tiles remaining<br><strong id="tiles-remaining">40</strong></div>
  <button id="new-game-btn">New Game</button>
  <div id="legend">
    <h3>Tile Legend</h3>
  </div>
</div>

<!-- Main canvas -->
<div id="game-area">
  <canvas id="board"></canvas>

  <!-- Next tile preview -->
  <div id="preview">
    <div class="label">Next Tile</div>
    <div class="tile-name" id="preview-name"></div>
    <canvas id="preview-canvas" width="70" height="70"></canvas>
  </div>

  <!-- Navigation controls hint -->
  <div id="nav-controls">
    <div class="label">Controls</div>
    <div class="nav-row"><kbd>&larr;</kbd><kbd>&uarr;</kbd><kbd>&darr;</kbd><kbd>&rarr;</kbd> Pan</div>
    <div class="nav-row"><kbd>+</kbd> <kbd>&minus;</kbd> Zoom</div>
    <div class="nav-row">Drag to pan &middot; Scroll to zoom</div>
  </div>

  <!-- End-of-game overlay -->
  <div id="overlay">
    <h2>All done!</h2>
    <button id="overlay-new-game">Play Again</button>
  </div>
</div>

<script>
// ════════════════════════════════════════════
//  TILE DEFINITIONS
// ════════════════════════════════════════════
const TILE_TYPES = [
  { name: 'Forest',  color: '#2d6a4f', icon: '🌲' },
  { name: 'Village', color: '#b5651d', icon: '🏠' },
  { name: 'Field',   color: '#a3b18a', icon: '🌾' },
  { name: 'River',   color: '#219ebc', icon: '🌊' },
  { name: 'Rail',    color: '#6c757d', icon: '🚂' },
];

const MAX_TILES = 40;

// ════════════════════════════════════════════
//  HEX MATH  (flat-top hexagons)
// ════════════════════════════════════════════
const HEX_SIZE = 42; // radius (centre to vertex)

// Axial directions for flat-top hex neighbours
const DIRS = [
  [+1, 0], [-1, 0], [0, +1], [0, -1], [+1, -1], [-1, +1]
];

function hexToPixel(q, r) {
  const x = HEX_SIZE * (3 / 2 * q);
  const y = HEX_SIZE * (Math.sqrt(3) / 2 * q + Math.sqrt(3) * r);
  return { x, y };
}

function pixelToHex(px, py) {
  const q = (2 / 3 * px) / HEX_SIZE;
  const r = (-1 / 3 * px + Math.sqrt(3) / 3 * py) / HEX_SIZE;
  return hexRound(q, r);
}

function hexRound(qf, rf) {
  const sf = -qf - rf;
  let q = Math.round(qf);
  let r = Math.round(rf);
  let s = Math.round(sf);
  const dq = Math.abs(q - qf);
  const dr = Math.abs(r - rf);
  const ds = Math.abs(s - sf);
  if (dq > dr && dq > ds) q = -r - s;
  else if (dr > ds) r = -q - s;
  return { q, r };
}

function hexKey(q, r) { return `${q},${r}`; }

function getNeighbors(q, r) {
  return DIRS.map(([dq, dr]) => ({ q: q + dq, r: r + dr }));
}

// ════════════════════════════════════════════
//  GAME STATE
// ════════════════════════════════════════════
let placed = new Map();   // key -> tileType index
let ghosts = new Set();   // keys of valid placement spots
let tilesLeft = MAX_TILES;
let nextTile = 0;
let gameOver = false;

// Camera / pan / zoom
let camX = 0, camY = 0;
let zoom = 1;
const ZOOM_MIN = 0.3, ZOOM_MAX = 3, ZOOM_STEP = 0.1;
let dragging = false, dragStartX, dragStartY, camStartX, camStartY;

// Canvas refs
const boardCanvas = document.getElementById('board');
const ctx = boardCanvas.getContext('2d');
const previewCanvas = document.getElementById('preview-canvas');
const pctx = previewCanvas.getContext('2d');

// ════════════════════════════════════════════
//  INIT / NEW GAME
// ════════════════════════════════════════════
function newGame() {
  placed = new Map();
  ghosts = new Set();
  tilesLeft = MAX_TILES;
  gameOver = false;

  // Place a random starting tile at origin
  const startType = randTile();
  placed.set(hexKey(0, 0), startType);
  rebuildGhosts();

  nextTile = randTile();
  updateUI();
  document.getElementById('overlay').classList.remove('visible');
  draw();
}

function randTile() {
  return Math.floor(Math.random() * TILE_TYPES.length);
}

function rebuildGhosts() {
  ghosts.clear();
  for (const key of placed.keys()) {
    const [q, r] = key.split(',').map(Number);
    for (const n of getNeighbors(q, r)) {
      const nk = hexKey(n.q, n.r);
      if (!placed.has(nk)) ghosts.add(nk);
    }
  }
}

// ════════════════════════════════════════════
//  DRAWING
// ════════════════════════════════════════════
function resize() {
  const rect = boardCanvas.parentElement.getBoundingClientRect();
  boardCanvas.width = rect.width * devicePixelRatio;
  boardCanvas.height = rect.height * devicePixelRatio;
  ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
  draw();
}

function draw() {
  const w = boardCanvas.width / devicePixelRatio;
  const h = boardCanvas.height / devicePixelRatio;
  ctx.clearRect(0, 0, w, h);

  ctx.save();
  ctx.translate(w / 2 + camX, h / 2 + camY);
  ctx.scale(zoom, zoom);

  // Draw ghosts
  for (const key of ghosts) {
    const [q, r] = key.split(',').map(Number);
    const { x, y } = hexToPixel(q, r);
    drawHex(ctx, x, y, HEX_SIZE, null, true);
  }

  // Draw placed tiles
  for (const [key, typeIdx] of placed) {
    const [q, r] = key.split(',').map(Number);
    const { x, y } = hexToPixel(q, r);
    drawHex(ctx, x, y, HEX_SIZE, typeIdx, false);
  }

  ctx.restore();
}

function drawHex(context, cx, cy, size, typeIdx, isGhost) {
  context.beginPath();
  for (let i = 0; i < 6; i++) {
    const angle = Math.PI / 180 * (60 * i);
    const vx = cx + size * Math.cos(angle);
    const vy = cy + size * Math.sin(angle);
    if (i === 0) context.moveTo(vx, vy);
    else context.lineTo(vx, vy);
  }
  context.closePath();

  if (isGhost) {
    context.fillStyle = 'rgba(255,255,255,0.06)';
    context.fill();
    context.strokeStyle = 'rgba(255,255,255,0.18)';
    context.lineWidth = 1.5;
    context.setLineDash([4, 4]);
    context.stroke();
    context.setLineDash([]);
  } else {
    const tile = TILE_TYPES[typeIdx];
    context.fillStyle = tile.color;
    context.fill();
    context.strokeStyle = 'rgba(0,0,0,0.35)';
    context.lineWidth = 2;
    context.stroke();

    // Icon
    context.font = `${size * 0.55}px serif`;
    context.textAlign = 'center';
    context.textBaseline = 'middle';
    context.fillText(tile.icon, cx, cy + 1);
  }
}

function drawPreview() {
  const s = 70;
  pctx.clearRect(0, 0, s, s);
  pctx.save();
  pctx.translate(s / 2, s / 2);
  drawHex(pctx, 0, 0, 28, nextTile, false);
  pctx.restore();
}

// ════════════════════════════════════════════
//  UI UPDATES
// ════════════════════════════════════════════
function updateUI() {
  document.getElementById('tiles-remaining').textContent = tilesLeft;
  const tile = TILE_TYPES[nextTile];
  document.getElementById('preview-name').textContent = tile.name;
  document.getElementById('preview-name').style.color = tile.color;
  drawPreview();
}

// Build legend once
function buildLegend() {
  const container = document.getElementById('legend');
  // keep the h3
  TILE_TYPES.forEach(t => {
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.innerHTML = `<div class="legend-swatch" style="background:${t.color}">${t.icon}</div>${t.name}`;
    container.appendChild(item);
  });
}

// ════════════════════════════════════════════
//  INPUT HANDLING
// ════════════════════════════════════════════
boardCanvas.addEventListener('pointerdown', e => {
  dragging = true;
  dragStartX = e.clientX;
  dragStartY = e.clientY;
  camStartX = camX;
  camStartY = camY;
  boardCanvas.setPointerCapture(e.pointerId);
});

boardCanvas.addEventListener('pointermove', e => {
  if (!dragging) return;
  camX = camStartX + (e.clientX - dragStartX);
  camY = camStartY + (e.clientY - dragStartY);
  draw();
});

boardCanvas.addEventListener('pointerup', e => {
  if (!dragging) return;
  const dx = e.clientX - dragStartX;
  const dy = e.clientY - dragStartY;
  dragging = false;

  // If barely moved, treat as a click
  if (Math.abs(dx) < 5 && Math.abs(dy) < 5) {
    handleClick(e);
  }
});

function handleClick(e) {
  if (gameOver) return;

  const rect = boardCanvas.getBoundingClientRect();
  const w = boardCanvas.width / devicePixelRatio;
  const h = boardCanvas.height / devicePixelRatio;

  const mx = (e.clientX - rect.left - w / 2 - camX) / zoom;
  const my = (e.clientY - rect.top - h / 2 - camY) / zoom;

  const { q, r } = pixelToHex(mx, my);
  const key = hexKey(q, r);

  if (ghosts.has(key)) {
    placed.set(key, nextTile);
    tilesLeft--;
    rebuildGhosts();

    if (tilesLeft <= 0) {
      gameOver = true;
      document.getElementById('overlay').classList.add('visible');
    } else {
      nextTile = randTile();
    }
    updateUI();
    draw();
  }
}

// ════════════════════════════════════════════
//  ZOOM (mouse wheel)
// ════════════════════════════════════════════
boardCanvas.addEventListener('wheel', e => {
  e.preventDefault();
  const delta = e.deltaY > 0 ? -ZOOM_STEP : ZOOM_STEP;
  zoom = Math.min(ZOOM_MAX, Math.max(ZOOM_MIN, zoom + delta));
  draw();
}, { passive: false });

// ════════════════════════════════════════════
//  KEYBOARD CONTROLS
// ════════════════════════════════════════════
const PAN_SPEED = 40;

window.addEventListener('keydown', e => {
  let handled = true;
  switch (e.key) {
    case 'ArrowLeft':  camX += PAN_SPEED; break;
    case 'ArrowRight': camX -= PAN_SPEED; break;
    case 'ArrowUp':    camY += PAN_SPEED; break;
    case 'ArrowDown':  camY -= PAN_SPEED; break;
    case '+': case '=':
      zoom = Math.min(ZOOM_MAX, zoom + ZOOM_STEP);
      break;
    case '-': case '_':
      zoom = Math.max(ZOOM_MIN, zoom - ZOOM_STEP);
      break;
    default: handled = false;
  }
  if (handled) {
    e.preventDefault();
    draw();
  }
});

// ════════════════════════════════════════════
//  BUTTONS
// ════════════════════════════════════════════
document.getElementById('new-game-btn').addEventListener('click', () => {
  camX = 0; camY = 0; zoom = 1;
  newGame();
});
document.getElementById('overlay-new-game').addEventListener('click', () => {
  camX = 0; camY = 0; zoom = 1;
  newGame();
});

// ════════════════════════════════════════════
//  BOOT
// ════════════════════════════════════════════
window.addEventListener('resize', resize);
buildLegend();
resize();
newGame();
</script>
</body>
</html>
